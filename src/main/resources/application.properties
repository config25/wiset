spring.application.name=wiset

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/wiset?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=11111111
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA (선택) - 사용 시 build.gradle에 spring-boot-starter-data-jpa 추가
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JSP View Resolver — JSP 가 WEB-INF/jsp/wbro 로 이전됨(views 폴더 비움). 컨트롤러는 폴더 없는 뷰명 반환.
spring.mvc.view.prefix=/WEB-INF/jsp/wbro/
spring.mvc.view.suffix=.jsp

# MyBatis (XML 매퍼 · snake_case -> camelCase 자동 매핑)
mybatis.mapper-locations=classpath:sqlmap/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.jdbc-type-for-null=NULL

# 파일 업로드 (포트폴리오 첨부 → TN_ATCH_FILE). 저장 루트와 멀티파트 한도.
app.upload.dir=${user.home}/wiset-uploads
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=60MB

# WISET AI 추론 서버 (외부 LLM API) — 실제 주소로 교체
wiset.ai.base-url=http://192.168.0.184:8000
wiset.ai.connect-timeout-ms=5000
wiset.ai.read-timeout-ms=180000
